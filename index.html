<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление Покупкой</title>
    <!-- Подключаем библиотеку Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #222222);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #ccc;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 Запуск Автобаера</h1>
        <input type="text" id="shop_code" placeholder="Введите код (например, 55021)">
        <button onclick="sendDataToBot()">ЗАПУСТИТЬ ОПЛАТУ</button>
    </div>

    <script>
        // Инициализация Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на все окно

        function sendDataToBot() {
            let code = document.getElementById('shop_code').value;

            if (code.trim() === "") {
                tg.showAlert("Пожалуйста, введите код!");
                return;
            }

            // Создаем объект с данными
            let data = {
                action: "buy",
                code: code
            };

            // Отправляем данные боту (они придут в хендлер content_type="web_app_data")
            tg.sendData(JSON.stringify(data));
            
            // Закрываем Web App
            tg.close();
        }
    </script>
</body>
</html>
